bibliography: bibliography.bib
csl: chicago-author-date.csl
link-citations: true

static-resources:
  - assets
#  - demos
  - papers
  - styles

exclude-directories:
  - Beispiele

math:
  # font: tex
  macros:
    E: '{\mathbb{E}}'
    R: '{\mathbb{R}}'
    N: '{\mathbb{N}}'
    Z: '{\mathbb{Z}}'
    Q: '{\mathbb{Q}}'
    C: '{\mathbb{C}}'
    Ac: '{\mathcal{A}}'
    Dc: '{\mathcal{D}}'
    Nc: '{\mathcal{N}}'
    Sc: '{\mathcal{S}}'
    Oc: '{\mathcal{O}}'
    Xc: '{\mathcal{X}}'
    aprime: '{a^{\prime}}'
    sprime: '{s^{\prime}}'
    piprime: '{\pi^{\prime}}'
    agivenb: ['{\left( #1  \middle| #2 \right)}', 2]
    pias: '{\pi\left( a  \middle| s \right)}'
    psprimesa: '{p\left( s^{\prime} \middle| s, a \right)}'
    pstplusstat: '{p\left( s_{t+1} \middle| s_t, a_t \right)}'
    pC: ['{p\left( #1  \middle|#2 \right)}', 2]
    policy: ['{\pi\left( #1  \middle|#2 \right)}', 2]
    Exp: ['{\mathbb{E}\left[ #1 \right]}', 1]
    Expsub: ['{\mathbb{E}_{#2}\left[ #1 \right]}', 2]
    ExpC: ['{\mathbb{E}\left[ #1 \middle| #2 \right]}', 2]
    ExpCsub: ['{\mathbb{E}_{#3}\left[ #1 \middle|#2 \right]}', 3]
    Var: '{\mathbb{E}}'
    Normal: ['{\Nc\left({#1},{#2}\right)}', 2]

    Vpi: '{V^\pi}'
    Qpi: '{Q^\pi}'
    Vstar: '{V^*}'
    Qstar: '{Q^*}'

    dx: '{\,\mathrm{d}x}'
    dt: '{\,\mathrm{d}t}'

    abs: ['\left\vert #1 \right\vert', 1]
    norm: ['\left\Vert #1 \right\Vert', 1]

    set: ['{\left\{ #1 \right\}}', 1]

    diff: ['{\frac{\mathrm{d} #1}{\mathrm{d} #2}}', 2]
    ndiff: ['{\frac{\mathrm{d}^{#3} #1}{\mathrm{d} {#2}^{#3}}}', 3]
    pdiff: ['{\frac{\partial #1}{\partial #2}}', 2]
    Re: ['{\mathrm{Re}\!\left( #1 \right)}', 1]
    Im: ['{\mathrm{Im}\!\left( #1 \right)}', 1]
