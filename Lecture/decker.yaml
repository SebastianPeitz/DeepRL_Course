
title:        Deep Reinforcement Learning
author:       Prof. Dr. Sebastian Peitz
affiliation:  Chair of Safe Autonomous Systems, TU Dortmund
date:         Summer term 2026
logos:        [ assets/inf-logo.svg ]

resource-pack: "exe:tudo"

colorscheme: light

template:
  deck:
    css:
      - 'styles/mafi-deck.css'
  page:
    css:
      - 'styles/mafi-menu.css'
      - 'styles/mafi-page.css'
    js-module:
      - 'scripts/mafi-page.js'
      - 'scripts/mafi-menu.js'

live-captions: false
lang: en

reveal:
  width: 1280
  height: 720
  checkOverflow: false
  center: true

explain:
  recWidth: 1920
  recHeight: 1080
  camWidth: 1280
  camHeight: 720
  useGreenScreen: true

whiteboard:
  autotoggle: true

zoom:
  trigger: "tripleClick"

